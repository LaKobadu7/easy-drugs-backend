# ================================================================
#  EASY-DRUGS — Configuration DÉVELOPPEMENT
#  Fichier : src/main/resources/application-dev.yml
# ================================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/easydrugs_db
    username: easydrugs_user
    password: easydrugs_pass

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:                   # Pas de password en dev

  # Désactiver le cache en dev pour faciliter les tests
  cache:
    type: simple

logging:
  level:
    com.easydrugs: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT avec durée courte en dev (1h)
jwt:
  expiration: 3600000

# Swagger toujours activé en dev
springdoc:
  swagger-ui:
    enabled: true
