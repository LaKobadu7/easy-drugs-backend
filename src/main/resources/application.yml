# ================================================================
#  EASY-DRUGS — Configuration principale Spring Boot
#  Fichier : src/main/resources/application.yml
# ================================================================

spring:

  # -- Profil actif (dev par défaut, overridé en prod) --
  profiles:
    active: dev

  application:
    name: easy-drugs-backend

  # -- Source de données PostgreSQL + PostGIS --
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/easydrugs_db}
    username: ${DB_USERNAME:easydrugs_user}
    password: ${DB_PASSWORD:easydrugs_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # -- JPA / Hibernate --
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gère le schéma, Hibernate valide
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # -- Flyway (migrations SQL) --
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # -- Redis (cache) --
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # -- Cache --
  cache:
    type: redis
    redis:
      time-to-live: 300000        # 5 minutes par défaut

  # -- Sérialisation JSON --
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Africa/Douala
    default-property-inclusion: non_null

# -- Serveur --
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ================================================================
#  SÉCURITÉ JWT
# ================================================================
jwt:
  secret: RWFzeURydWdzU1N1cGVyU2VjcmV0S2V5MjAyNlNhbmdtZWxpbWFDYW1lcm91bkNoYW5nZUluUHJvZA==
  expiration: 86400000            # 24h en millisecondes
  refresh-expiration: 604800000   # 7 jours

# ================================================================
#  GÉOLOCALISATION — Prototype Sangmélima
# ================================================================
geoloc:
  sangmelima:
    latitude: 3.0167              # Coordonnées centre Sangmélima
    longitude: 11.9833
    rayon-km: 20                  # Rayon max prototype
  distance:
    unite: km                     # Unité affichée

# ================================================================
#  FIREBASE FCM (Notifications push)
# ================================================================
firebase:
  config-file: ${FIREBASE_CONFIG:classpath:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:easy-drugs-cm}

# ================================================================
#  CLOUDINARY (Images médicaments)
# ================================================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:easydrugs}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# ================================================================
#  DOCUMENTATION API (Swagger UI)
# ================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  info:
    title: EASY-DRUGS API
    version: 1.0.0
    description: >
      API REST pour la géolocalisation de médicaments
      dans les pharmacies de Sangmélima — Cameroun.

# ================================================================
#  ACTUATOR (Monitoring)
# ================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
